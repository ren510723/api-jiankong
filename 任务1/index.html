<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>DeepSeek 余额监控</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 id="appTitle">DeepSeek 余额监控</h1>
            <button id="refreshBtn" class="refresh-btn" aria-label="刷新">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                </svg>
            </button>
        </header>

        <main class="main">
            <section class="balance-card">
                <div class="balance-label">当前余额</div>
                <div class="balance-amount" id="balanceAmount">--</div>
                <div class="balance-unit" id="balanceUnit">请先配置</div>
                <div class="balance-update-time" id="updateTime">--</div>
            </section>

            <section class="status-card">
                <div class="status-item">
                    <span class="status-label">状态</span>
                    <span class="status-value" id="statusValue">未连接</span>
                </div>
                <div class="status-item">
                    <span class="status-label">下次刷新</span>
                    <span class="status-value" id="nextRefresh">--</span>
                </div>
            </section>

            <section id="settingsCard" class="settings-card hidden">
                <h2>API 配置</h2>
                <form id="settingsForm">
                    <div class="form-group">
                        <label for="apiUrl">API 地址</label>
                        <input type="url" id="apiUrl" placeholder="https://api.deepseek.com/user/balance" value="https://api.deepseek.com/user/balance" required>
                        <small class="hint">返回余额的完整 URL</small>
                    </div>
                    <div class="form-group">
                        <label for="apiKeyHeader">认证 Header 名称</label>
                        <input type="text" id="apiKeyHeader" placeholder="Authorization" value="Authorization">
                        <small class="hint">DeepSeek 使用 Authorization</small>
                    </div>
                    <div class="form-group">
                        <label for="apiKey">API Key / Token</label>
                        <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxx">
                        <small class="hint">在 https://platform.deepseek.com 申请</small>
                    </div>
                    <div class="form-group">
                        <label for="jsonPath">余额字段路径</label>
                        <input type="text" id="jsonPath" placeholder="balance_infos[0].total_balance" value="balance_infos[0].total_balance">
                        <small class="hint">支持数组下标，如 balance_infos[0].total_balance</small>
                    </div>
                    <div class="form-group">
                        <label for="currencyUnit">货币单位</label>
                        <input type="text" id="currencyUnit" placeholder="¥" value="¥">
                        <small class="hint">DeepSeek 默认人民币</small>
                    </div>
                    <div class="form-group">
                        <label for="refreshInterval">刷新间隔（秒）</label>
                        <input type="number" id="refreshInterval" min="10" max="3600" value="120">
                        <small class="hint">自动刷新间隔，建议 120 秒以上</small>
                    </div>
                    <div class="form-group">
                        <label for="useBearer">使用 Bearer Token 格式</label>
                        <div class="switch-wrapper">
                            <input type="checkbox" id="useBearer" class="switch" checked>
                            <label for="useBearer">Bearer {token}</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">保存配置</button>
                    <button type="button" id="testBtn" class="btn-secondary">测试连接</button>
                </form>
                <div id="testResult" class="test-result"></div>
            </section>

            <button id="toggleSettings" class="btn-link">⚙️ 设置</button>
        </main>

        <div id="toast" class="toast"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
