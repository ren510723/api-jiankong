name: 构建 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 设置 Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: 赋予执行权限
      run: chmod +x gradlew

    - name: 构建 Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: 复制 APK
      run: |
        mkdir -p release
        cp app/build/outputs/apk/release/*.apk release/DeepSeekBalance-latest.apk
        cp app/build/outputs/apk/release/*.apk release/DeepSeekBalance-v${{ github.run_number }}.apk

    - name: 上传 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekBalance-APK
        path: |
          release/DeepSeekBalance-latest.apk
          release/DeepSeekBalance-v${{ github.run_number }}.apk
        retention-days: 30

    - name: 创建 Release
      uses: softprops/action-gh-release@v2
      with:
        name: DeepSeek 余额 v${{ github.run_number }}
        body: |
          ## DeepSeek 余额监控 APK
          
          - ✅ 系统级桌面小组件
          - ✅ 自动定时刷新
          - ✅ 点击小组件直接打开 App
          - ✅ 余额/状态/时间显示

          **安装方式**：
          1. 下载 `DeepSeekBalance-latest.apk`
          2. 在手机文件管理中点击安装
          3. 允许"安装未知来源应用"
          4. 打开 App 配置你的 DeepSeek API Key
          5. 长按桌面添加小组件
        files: |
          release/DeepSeekBalance-latest.apk
          release/DeepSeekBalance-v${{ github.run_number }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
