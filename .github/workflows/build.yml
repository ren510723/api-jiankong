name: 构建 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 安装 Gradle 8.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt
        echo "GRADLE_HOME=/opt/gradle-8.4" >> $GITHUB_ENV
        echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

    - name: 构建 Release APK
      run: gradle assembleRelease --no-daemon

    - name: 复制 APK
      run: |
        mkdir -p release
        cp app/build/outputs/apk/release/*.apk release/DeepSeekBalance-latest.apk
        cp app/build/outputs/apk/release/*.apk release/DeepSeekBalance-v${{ github.run_number }}.apk

    - name: 上传 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekBalance-APK
        path: |
          release/DeepSeekBalance-latest.apk
          release/DeepSeekBalance-v${{ github.run_number }}.apk
        retention-days: 90
